<html>
    <head>
        <title>Movingcar</title>
    </head>
<body>
      <div class="car">
        <div class="tyre left"></div>
        <div class="tyre right"></div>
      </div>
</body>
    <style>
        body{
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url(single.png);
            background-size: cover;
            overflow: hidden;
            background-position: 0px;
            animation: bgmove 3s linear infinite;
        }
        @keyframes bgmove{
            0%{
                 background-position: 0px;
            }
            100%{
                 background-position: 936px;
            }
        }
        .car{
            position: absolute;
            bottom: 9.5%;
            right: 0%;
            width: 350px;
            height: 120;
            background-image: url(carchotu.png.png);
            animation: car 6s infinite linear;
        }
        @keyframes car{
            0%{
                right: 0%;
            }
             100%{
                right: 100%;
            }
        }
        .tyre{
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: black;
        }
        .left{
            position: absolute;
            top: 50%;
            left: 10%;
        }
        .right{
            position: absolute;
            top: 50%;
            right: 15%;
        }
    </style>
</html>
